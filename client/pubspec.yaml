name: movie_app
version: 1.0.0+1
publish_to: 'none'

description: 影视聚合APP

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_staggered_grid_view: ^0.7.0
  
  # 状态管理
  flutter_riverpod: ^2.4.0
  
  # 网络
  dio: ^5.3.0
  connectivity_plus: ^5.0.0
  
  # 存储
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 视频播放
  video_player: ^2.8.0
  chewie: ^1.7.0
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # 工具
  intl: ^0.18.1
  url_launcher: ^6.2.0
  share_plus: ^7.2.0
  path_provider: ^2.1.0
  
  # 图片
  photo_view: ^0.14.0
  
  # 下拉刷新
  pull_to_refresh: ^2.0.0
  
  # 本地通知
  flutter_local_notifications: ^16.0.0

dependency_overrides:
  pull_to_refresh:
    git:
      url: https://github.com/miquelbeltran/flutter_pull_to_refresh
      ref: master

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
